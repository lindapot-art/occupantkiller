name: 🎮 Staging URL

on:
  push:
    branches:
      - 'copilot/**'
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: staging-tunnel
  cancel-in-progress: true

jobs:
  tunnel:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install serve
        run: npm install -g serve@14

      - name: Start static server on port 3000
        run: nohup serve -l 3000 . > /tmp/serve.log 2>&1 &

      - name: Install cloudflared
        run: |
          curl -fsSL https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64.deb \
            -o /tmp/cloudflared.deb
          sudo dpkg -i /tmp/cloudflared.deb

      - name: Start tunnel and capture URL
        id: tunnel
        run: |
          cloudflared tunnel --url http://localhost:3000 > /tmp/cf.log 2>&1 &
          CF_PID=$!
          echo "Waiting for tunnel URL..."
          for i in $(seq 1 40); do
            URL=$(grep -oP 'https://[a-z0-9-]+\.trycloudflare\.com' /tmp/cf.log | head -1)
            if [ -n "$URL" ]; then
              echo "url=$URL" >> "$GITHUB_OUTPUT"
              echo "✅ Tunnel ready: $URL"
              break
            fi
            sleep 3
          done
          if [ -z "$URL" ]; then
            echo "::error::Tunnel URL not detected after 120s"
            cat /tmp/cf.log
            exit 1
          fi

      - name: Post URL to PR
        uses: actions/github-script@v7
        with:
          script: |
            const url = '${{ steps.tunnel.outputs.url }}';
            if (!url) { console.log('No URL captured'); return; }

            const branch = context.ref.replace('refs/heads/', '');
            const { data: prs } = await github.rest.pulls.list({
              owner: context.repo.owner,
              repo: context.repo.repo,
              head: `${context.repo.owner}:${branch}`,
              state: 'open'
            });

            const body = [
              '## 🎮 Game Staging URL',
              '',
              `**▶️ Play now:** ${url}`,
              '',
              `> Live for ~60 min (while this [Action run](${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}) is active).`,
              `> A new URL is posted on every push.`
            ].join('\n');

            if (prs.length > 0) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: prs[0].number,
                body
              });
              console.log(`Posted to PR #${prs[0].number}: ${url}`);
            } else {
              console.log(`No open PR found for branch ${branch}. URL: ${url}`);
            }

      - name: Keep tunnel alive (60 min)
        run: |
          echo "Game serving at: ${{ steps.tunnel.outputs.url }}"
          echo "Keeping tunnel alive for up to 60 minutes..."
          sleep 3600
