<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>FPS – Three.js</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#000;overflow:hidden;font-family:Arial,sans-serif}
#c{width:100vw;height:100vh;display:block}

/* Crosshair */
#xhair{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);
  width:20px;height:20px;pointer-events:none;z-index:10}
#xhair::before,#xhair::after{content:'';position:absolute;background:rgba(255,255,255,.85)}
#xhair::before{width:2px;height:20px;left:9px;top:0}
#xhair::after{width:20px;height:2px;left:0;top:9px}

/* HUD */
#hud{position:fixed;bottom:20px;left:20px;z-index:10;color:#fff;font-size:15px;text-shadow:1px 1px 3px #000}
#hp-bar-wrap{width:180px;height:14px;background:rgba(0,0,0,.6);border:1px solid #666;border-radius:3px;margin-top:4px}
#hp-bar{height:100%;width:100%;background:#0f0;border-radius:3px;transition:width .15s,background .15s}

#ammo{position:fixed;bottom:20px;right:20px;color:#fff;font-size:18px;text-shadow:1px 1px 3px #000;z-index:10}
#weapon-name{position:fixed;bottom:50px;right:20px;color:#ff0;font-size:14px;z-index:10}

/* Timestamp */
#ts{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);
  color:#0f0;font-size:13px;font-family:monospace;text-shadow:1px 1px 3px #000;z-index:10}

/* Kill feed */
#killfeed{position:fixed;top:60px;right:20px;color:#f44;font-size:13px;z-index:10;text-align:right}

/* Overlay – click to play */
#overlay{position:fixed;inset:0;background:rgba(0,0,0,.8);display:flex;
  flex-direction:column;align-items:center;justify-content:center;z-index:100;color:#fff}
#overlay h1{font-size:2.5rem;margin-bottom:.5rem}
#overlay p{color:#aaa;margin-bottom:2rem;font-size:1rem}
#btn-play{padding:14px 40px;font-size:1.1rem;background:#c00;border:none;color:#fff;
  cursor:pointer;border-radius:6px;letter-spacing:.05em}
#btn-play:hover{background:#f00}

/* Pause */
#pause{position:fixed;inset:0;background:rgba(0,0,0,.6);display:none;
  align-items:center;justify-content:center;z-index:99;color:#fff;font-size:3rem;font-weight:bold;letter-spacing:.2em}

/* Game over */
#gameover{position:fixed;inset:0;background:rgba(80,0,0,.85);display:none;
  flex-direction:column;align-items:center;justify-content:center;z-index:101;color:#fff}
#gameover h1{font-size:3rem;margin-bottom:1rem}
#gameover button{padding:12px 32px;font-size:1rem;cursor:pointer;background:#c00;border:none;color:#fff;border-radius:6px}

/* Loading */
#loading{position:fixed;inset:0;background:#111;display:flex;flex-direction:column;
  align-items:center;justify-content:center;z-index:200;color:#fff;font-size:1.2rem;gap:12px}
#load-bar-wrap{width:320px;height:12px;background:#333;border-radius:6px;overflow:hidden}
#load-bar{width:0%;height:100%;background:#0af;transition:width .2s}
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="xhair"></div>

<div id="hud">
  <span id="hp-txt">HP: 100</span>
  <div id="hp-bar-wrap"><div id="hp-bar"></div></div>
</div>
<div id="ammo">∞</div>
<div id="weapon-name">M60</div>
<div id="ts"></div>
<div id="killfeed"></div>

<div id="overlay">
  <h1>FPS</h1>
  <p>WASD – move &nbsp;|&nbsp; Mouse – look &nbsp;|&nbsp; Click – shoot &nbsp;|&nbsp; 1/2/3 – weapons &nbsp;|&nbsp; ESC – pause</p>
  <button id="btn-play">CLICK TO PLAY</button>
</div>
<div id="pause">PAUSED</div>
<div id="gameover">
  <h1>YOU DIED</h1>
  <button onclick="location.reload()">Restart</button>
</div>
<div id="loading">
  <div>Loading assets…</div>
  <div id="load-bar-wrap"><div id="load-bar"></div></div>
  <div id="load-txt">0 / 6</div>
</div>

<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.162.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.162.0/examples/jsm/"
  }
}
</script>
<script type="module">
import * as THREE from 'three';
import { PointerLockControls } from 'three/addons/controls/PointerLockControls.js';
import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

// ═══════════════════════════════════════════════════════════
//  CONFIG
// ═══════════════════════════════════════════════════════════
const SPAWN        = new THREE.Vector3(-28.8, 43, -49);
const NPC_SPAWN    = new THREE.Vector3(0, 41.7, 0);   // far from player
const PLAYER_SPEED = 12;
const JUMP_VEL     = 14;
const GRAVITY      = -30;
const PLAYER_HP    = 100;
const ENEMY_HP     = 100;
const ENEMY_DAMAGE = 0.08;  // per frame at melee range (~5 HP/s per enemy)
const ENEMY_SPEED  = 4;
const MELEE_RANGE  = 3.5;
const SHOOT_DAMAGE = 30;
const NUM_ENEMIES  = 10;
const ENEMY_SCALE  = 1.8;   // display scale for run_fast GLB

const WEAPONS = [
  { name:'M60',   file:'model/fps_q1_1/fps_q1_1.glb',  scale:0.04, offset:new THREE.Vector3(.4,-.35,-.7), rot:new THREE.Euler(0, Math.PI, 0) },
  { name:'Pistol',file:'model/fps_q2_1/fps_q2_1.glb',  scale:0.04, offset:new THREE.Vector3(.35,-.3,-.5), rot:new THREE.Euler(0, Math.PI, 0) },
  { name:'Sword', file:'model/fps_q3_2/fps_q3_2.glb',  scale:0.04, offset:new THREE.Vector3(.3,-.4,-.5),  rot:new THREE.Euler(0, Math.PI, 0) },
];

// ═══════════════════════════════════════════════════════════
//  RENDERER & SCENE
// ═══════════════════════════════════════════════════════════
const renderer = new THREE.WebGLRenderer({ canvas: document.getElementById('c'), antialias: true });
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
renderer.setSize(innerWidth, innerHeight);
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x87ceeb);
scene.fog = new THREE.Fog(0x87ceeb, 80, 250);

// ═══════════════════════════════════════════════════════════
//  CAMERA & CONTROLS
// ═══════════════════════════════════════════════════════════
const camera = new THREE.PerspectiveCamera(75, innerWidth / innerHeight, 0.1, 500);
camera.position.copy(SPAWN);

const controls = new PointerLockControls(camera, document.body);
scene.add(controls.getObject());

// ═══════════════════════════════════════════════════════════
//  LIGHTING
// ═══════════════════════════════════════════════════════════
const ambient = new THREE.AmbientLight(0xffffff, 0.7);
scene.add(ambient);
const sun = new THREE.DirectionalLight(0xfff4e0, 1.4);
sun.position.set(50, 100, 30);
sun.castShadow = true;
sun.shadow.mapSize.set(2048, 2048);
sun.shadow.camera.near = 1;
sun.shadow.camera.far = 300;
sun.shadow.camera.left = sun.shadow.camera.bottom = -100;
sun.shadow.camera.right = sun.shadow.camera.top = 100;
scene.add(sun);

// ═══════════════════════════════════════════════════════════
//  ASSET LOADING
// ═══════════════════════════════════════════════════════════
const loader = new GLTFLoader();
// Global GLTFLoader fallback: try original URL, then a placeholder GLB, then a primitive.
(function(){
  const orig = GLTFLoader.prototype.load;
  GLTFLoader.prototype.load = function(url, onLoad, onProgress, onError){
    let triedPlaceholder = false;
    const placeholder = 'model/placeholder/placeholder.glb';
    const wrappedOnError = (err) => {
      console.warn('GLTF load failed for', url, err);
      if(!triedPlaceholder){
        triedPlaceholder = true;
        try { orig.call(this, placeholder, onLoad, onProgress, wrappedOnError); }
        catch(e){ console.warn('Placeholder load also failed', e); if(onError) onError(e); }
      } else {
        // final fallback: create a simple box mesh and call onLoad with a fake gltf
        const mesh = new THREE.Mesh(new THREE.BoxGeometry(1,1,1), new THREE.MeshLambertMaterial({color:0x888888}));
        const fake = { scene: mesh };
        try { if(onLoad) onLoad(fake); } catch(e){ console.error(e); }
        if(onError) onError(err);
      }
    };
    try { orig.call(this, url, onLoad, onProgress, wrappedOnError); }
    catch(e){ wrappedOnError(e); }
  };
})();
let loadDone = 0;
const TOTAL_LOADS = 5; // map + 3 weapons + enemy
function onLoad() {
  loadDone++;
  document.getElementById('load-bar').style.width = (loadDone / TOTAL_LOADS * 100) + '%';
  document.getElementById('load-txt').textContent = loadDone + ' / ' + TOTAL_LOADS;
  if (loadDone >= TOTAL_LOADS) {
    setTimeout(() => document.getElementById('loading').style.display = 'none', 300);
  }
}

// Collision meshes (map geometry)
const collidable = [];

// Ground fallback
const ground = new THREE.Mesh(
  new THREE.PlaneGeometry(500, 500),
  new THREE.MeshLambertMaterial({ color: 0x556633 })
);
ground.rotation.x = -Math.PI / 2;
ground.position.y = 0;
ground.receiveShadow = true;
collidable.push(ground);
scene.add(ground);

// Load MAP
loader.load('model/xz_map1/xz_map1.glb', (gltf) => {
  const map = gltf.scene;
  map.traverse(m => {
    if (m.isMesh) {
      m.castShadow = true;
      m.receiveShadow = true;
      collidable.push(m);
    }
  });
  scene.add(map);
  onLoad();
}, undefined, (e) => { console.warn('Map load error:', e); onLoad(); });

// Weapon meshes (parented to camera)
const weaponMeshes = [];
let activeWeapon = 0;

WEAPONS.forEach((w, wi) => {
  loader.load(w.file, (gltf) => {
    const mesh = gltf.scene;
    mesh.traverse(m => { if (m.isMesh) { m.castShadow = false; m.renderOrder = 999; } });
    mesh.scale.setScalar(w.scale);
    mesh.position.copy(w.offset);
    mesh.rotation.copy(w.rot);
    mesh.visible = (wi === 0);
    camera.add(mesh);
    weaponMeshes[wi] = mesh;
    onLoad();
  }, undefined, (e) => { console.warn('Weapon', wi, 'load error:', e); onLoad(); });
});

// ═══════════════════════════════════════════════════════════
//  ENEMY SYSTEM
// ═══════════════════════════════════════════════════════════
const enemies = [];
let enemyTemplate = null;

loader.load(
  'model/putin_unrigged/Meshy_AI_biped/Meshy_AI_Animation_run_fast_5_withSkin.glb',
  (gltf) => {
    enemyTemplate = gltf.scene;

    // Compute bounding box of template
    const box = new THREE.Box3().setFromObject(enemyTemplate);
    const height = box.max.y - box.min.y;
    const scale = height > 0.001 ? ENEMY_SCALE / height : 1;
    const yOff  = -box.min.y * scale;

    for (let i = 0; i < NUM_ENEMIES; i++) {
      const clone = enemyTemplate.clone(true);
      clone.scale.setScalar(scale);
      clone.traverse(m => {
        if (m.isMesh) {
          m.castShadow = true;
          // give each instance its own material so we can tint on hit
          if (m.material) {
            m.material = m.material.clone();
          }
        }
      });

      // Spawn in a circle around NPC_SPAWN
      const angle = (i / NUM_ENEMIES) * Math.PI * 2;
      const r = 20;
      clone.position.set(
        NPC_SPAWN.x + Math.cos(angle) * r,
        NPC_SPAWN.y + yOff,
        NPC_SPAWN.z + Math.sin(angle) * r
      );

      // Enemy hitbox (invisible box for raycasting)
      const hitGeo = new THREE.BoxGeometry(1.5, ENEMY_SCALE, 1.5);
      const hitMat = new THREE.MeshBasicMaterial({ visible: false });
      const hitBox = new THREE.Mesh(hitGeo, hitMat);
      hitBox.position.set(
        NPC_SPAWN.x + Math.cos(angle) * r,
        NPC_SPAWN.y + yOff + ENEMY_SCALE * 0.5,
        NPC_SPAWN.z + Math.sin(angle) * r
      );
      hitBox.userData.enemyIndex = i;

      scene.add(clone);
      scene.add(hitBox);

      enemies.push({
        mesh: clone,
        hitBox: hitBox,
        hp: ENEMY_HP,
        dead: false,
        respawnTimer: 0,
        yOff: yOff,
        scale: scale,
        spawnPos: clone.position.clone(),
        hitFlash: 0,
      });
    }
    onLoad();
  },
  undefined,
  (e) => {
    console.warn('Enemy GLB failed, using capsule fallback:', e);
    // Fallback: simple capsule enemies
    for (let i = 0; i < NUM_ENEMIES; i++) {
      const geo = new THREE.CapsuleGeometry(0.5, 1.5, 4, 8);
      const mat = new THREE.MeshLambertMaterial({ color: 0xff2222 });
      const mesh = new THREE.Mesh(geo, mat);
      const angle = (i / NUM_ENEMIES) * Math.PI * 2;
      const r = 5;
      mesh.position.set(NPC_SPAWN.x + Math.cos(angle)*r, NPC_SPAWN.y+1, NPC_SPAWN.z+Math.sin(angle)*r);
      mesh.userData.enemyIndex = i;
      scene.add(mesh);
      enemies.push({
        mesh: mesh, hitBox: mesh, hp: ENEMY_HP, dead: false,
        respawnTimer: 0, yOff: 1, scale: 1,
        spawnPos: mesh.position.clone(), hitFlash: 0,
      });
    }
    onLoad();
  }
);

// ═══════════════════════════════════════════════════════════
//  PLAYER STATE
// ═══════════════════════════════════════════════════════════
let playerHp = PLAYER_HP;
let playerVelY = 0;
let isOnGround = false;
const moveDir = { f:false, b:false, l:false, r:false };

// ═══════════════════════════════════════════════════════════
//  SHOOTING
// ═══════════════════════════════════════════════════════════
const raycaster = new THREE.Raycaster();
const shootDir = new THREE.Vector3();

function shoot() {
  if (!controls.isLocked || playerHp <= 0) return;
  camera.getWorldDirection(shootDir);
  raycaster.set(camera.position, shootDir);

  // check enemy hitboxes first
  const targets = enemies.filter(e => !e.dead).map(e => e.hitBox);
  const hits = raycaster.intersectObjects(targets, true);
  if (hits.length > 0) {
    const obj = hits[0].object;
    let idx = obj.userData.enemyIndex;
    if (idx === undefined && obj.parent) idx = obj.parent.userData.enemyIndex;
    if (idx !== undefined && !enemies[idx].dead) {
      enemies[idx].hp -= SHOOT_DAMAGE;
      enemies[idx].hitFlash = 0.15;
      flashKill('#f80', 'Hit! Enemy HP: ' + Math.max(0, enemies[idx].hp));
      if (enemies[idx].hp <= 0) killEnemy(idx);
    }
  }
}

function killEnemy(i) {
  const e = enemies[i];
  e.dead = true;
  e.mesh.visible = false;
  e.hitBox.visible = false;
  e.hitBox.position.set(9999, 9999, 9999);
  e.respawnTimer = 5;
  flashKill('#0f0', 'Enemy down #' + i);
}

function respawnEnemy(i) {
  const e = enemies[i];
  e.hp = ENEMY_HP;
  e.dead = false;
  e.mesh.visible = true;
  e.hitBox.visible = false; // always invisible
  e.mesh.position.copy(e.spawnPos);
  e.hitBox.position.set(e.spawnPos.x, e.spawnPos.y + ENEMY_SCALE*0.5, e.spawnPos.z);
}

// Kill feed
const killFeedLines = [];
function flashKill(color, msg) {
  const el = document.getElementById('killfeed');
  killFeedLines.push({ msg, color, age: 0 });
  if (killFeedLines.length > 5) killFeedLines.shift();
  el.innerHTML = killFeedLines.map(l => `<div style="color:${l.color}">${l.msg}</div>`).join('');
}

// ═══════════════════════════════════════════════════════════
//  COLLISION (vertical + horizontal ray approach)
// ═══════════════════════════════════════════════════════════
const downRay = new THREE.Raycaster(new THREE.Vector3(), new THREE.Vector3(0,-1,0), 0, 3);
const wallRay = new THREE.Raycaster();

function resolveGravityAndGround(dt) {
  playerVelY += GRAVITY * dt;

  // Downward ray
  downRay.ray.origin.copy(camera.position);
  const hits = downRay.intersectObjects(collidable, true);
  if (hits.length > 0 && hits[0].distance < 1.85) {
    if (playerVelY < 0) playerVelY = 0;
    camera.position.y = hits[0].point.y + 1.8;
    isOnGround = true;
  } else {
    isOnGround = false;
    camera.position.y += playerVelY * dt;
  }
  // Safety floor
  if (camera.position.y < 1.8) { camera.position.y = 1.8; playerVelY = 0; isOnGround = true; }
}

// ═══════════════════════════════════════════════════════════
//  INPUT
// ═══════════════════════════════════════════════════════════
document.addEventListener('keydown', e => {
  switch(e.code) {
    case 'KeyW': moveDir.f = true; break;
    case 'KeyS': moveDir.b = true; break;
    case 'KeyA': moveDir.l = true; break;
    case 'KeyD': moveDir.r = true; break;
    case 'Space': if(isOnGround){ playerVelY = JUMP_VEL; isOnGround=false; } break;
    case 'Digit1': switchWeapon(0); break;
    case 'Digit2': switchWeapon(1); break;
    case 'Digit3': switchWeapon(2); break;
    case 'Escape':
      if (controls.isLocked) controls.unlock();
      break;
  }
});
document.addEventListener('keyup', e => {
  switch(e.code) {
    case 'KeyW': moveDir.f = false; break;
    case 'KeyS': moveDir.b = false; break;
    case 'KeyA': moveDir.l = false; break;
    case 'KeyD': moveDir.r = false; break;
  }
});
document.addEventListener('mousedown', e => { if(e.button===0) shoot(); });

controls.addEventListener('unlock', () => {
  const p = document.getElementById('pause');
  p.style.display = 'flex';
});
controls.addEventListener('lock', () => {
  const p = document.getElementById('pause');
  p.style.display = 'none';
});

document.getElementById('btn-play').addEventListener('click', () => {
  controls.lock();
  document.getElementById('overlay').style.display = 'none';
});

function switchWeapon(i) {
  activeWeapon = i;
  weaponMeshes.forEach((m, idx) => { if(m) m.visible = idx === i; });
  document.getElementById('weapon-name').textContent = WEAPONS[i].name;
}

// ═══════════════════════════════════════════════════════════
//  HUD UPDATES
// ═══════════════════════════════════════════════════════════
function updateHud() {
  const pct = Math.max(0, playerHp / PLAYER_HP * 100);
  document.getElementById('hp-txt').textContent = 'HP: ' + Math.max(0, Math.floor(playerHp));
  const bar = document.getElementById('hp-bar');
  bar.style.width = pct + '%';
  bar.style.background = pct > 50 ? '#0f0' : pct > 25 ? '#ff0' : '#f00';
}

// Timestamp
function updateTimestamp() {
  const d = new Date();
  const pad = n => n < 10 ? '0'+n : n;
  document.getElementById('ts').textContent =
    d.getFullYear()+'-'+pad(d.getMonth()+1)+'-'+pad(d.getDate())+' '+pad(d.getHours())+':'+pad(d.getMinutes());
}
updateTimestamp();
setInterval(updateTimestamp, 30000);

// ═══════════════════════════════════════════════════════════
//  MAIN LOOP
// ═══════════════════════════════════════════════════════════
const clock = new THREE.Clock();
const _dir = new THREE.Vector3();
const _fwd = new THREE.Vector3();
const _rgt = new THREE.Vector3();

function animate() {
  requestAnimationFrame(animate);
  const dt = Math.min(clock.getDelta(), 0.05);

  if (controls.isLocked && playerHp > 0) {
    // ── Player movement ──────────────────────────────────
    camera.getWorldDirection(_fwd);
    _fwd.y = 0; _fwd.normalize();
    _rgt.crossVectors(_fwd, camera.up).normalize();
    _dir.set(0, 0, 0);
    if (moveDir.f) _dir.addScaledVector(_fwd, 1);
    if (moveDir.b) _dir.addScaledVector(_fwd, -1);
    if (moveDir.r) _dir.addScaledVector(_rgt, 1);
    if (moveDir.l) _dir.addScaledVector(_rgt, -1);
    if (_dir.lengthSq() > 0) {
      _dir.normalize();
      controls.getObject().position.addScaledVector(_dir, PLAYER_SPEED * dt);
    }

    // ── Gravity / ground ────────────────────────────────
    resolveGravityAndGround(dt);

    // ── Enemies ─────────────────────────────────────────
    const playerPos = camera.position;
    enemies.forEach((e, i) => {
      if (e.dead) {
        e.respawnTimer -= dt;
        if (e.respawnTimer <= 0) respawnEnemy(i);
        return;
      }

      // Move toward player
      const toPlayer = new THREE.Vector3().subVectors(playerPos, e.mesh.position);
      toPlayer.y = 0;
      const dist = toPlayer.length();

      if (dist > 0.1 && dist < 120) {
        toPlayer.normalize();
        e.mesh.position.addScaledVector(toPlayer, ENEMY_SPEED * dt);
        e.hitBox.position.x = e.mesh.position.x;
        e.hitBox.position.z = e.mesh.position.z;
        e.hitBox.position.y = e.mesh.position.y + ENEMY_SCALE * 0.5;
        // Face player
        e.mesh.lookAt(playerPos.x, e.mesh.position.y, playerPos.z);
      }

      // Gravity for enemy
      e.mesh.position.y = NPC_SPAWN.y + e.yOff;

      // Melee damage
      if (dist < MELEE_RANGE) {
        playerHp -= ENEMY_DAMAGE;
        updateHud();
        if (playerHp <= 0) {
          playerHp = 0;
          document.getElementById('gameover').style.display = 'flex';
          controls.unlock();
        }
      }

      // Hit flash
      if (e.hitFlash > 0) {
        e.hitFlash -= dt;
        e.mesh.traverse(m => {
          if (m.isMesh && m.material) m.material.emissive && (m.material.emissive.setHex(0xff4400));
        });
      } else {
        e.mesh.traverse(m => {
          if (m.isMesh && m.material) m.material.emissive && (m.material.emissive.setHex(0x000000));
        });
      }
    });

    // Age killfeed
    killFeedLines.forEach(l => l.age += dt);
    if (killFeedLines.length && killFeedLines[0].age > 4) {
      killFeedLines.shift();
      document.getElementById('killfeed').innerHTML =
        killFeedLines.map(l => `<div style="color:${l.color}">${l.msg}</div>`).join('');
    }
  }

  renderer.render(scene, camera);
}
animate();

// ═══════════════════════════════════════════════════════════
//  RESIZE
// ═══════════════════════════════════════════════════════════
window.addEventListener('resize', () => {
  renderer.setSize(innerWidth, innerHeight);
  camera.aspect = innerWidth / innerHeight;
  camera.updateProjectionMatrix();
});
</script>
</body>
</html>
